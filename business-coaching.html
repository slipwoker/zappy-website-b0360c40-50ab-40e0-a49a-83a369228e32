    <!-- Zappy Analytics -->
<script>
(function() {
  'use strict';
  
  // Configuration
  var config = {
    websiteId: 'b0360c40-50ab-40e0-a49a-83a369228e32',
    apiUrl: 'https://qaapi.zappy5.com/api/analytics/track',
    sessionDuration: 30 * 60 * 1000, // 30 minutes
    visitorDuration: 30 * 24 * 60 * 60 * 1000, // 30 days
    trackPageViews: true,
    trackClicks: true,
    trackFormSubmissions: true
  };
  
  // Generate or retrieve persistent visitor ID (30 days)
  function getVisitorId() {
    var visitorKey = 'zappy_visitor_' + config.websiteId;
    var visitor = null;
    
    try {
      visitor = localStorage.getItem(visitorKey);
      if (visitor) {
        var visitorData = JSON.parse(visitor);
        var now = Date.now();
        
        // Check if visitor ID is still valid (30 days)
        if (now - visitorData.created < config.visitorDuration) {
          // Update last seen timestamp
          visitorData.lastSeen = now;
          localStorage.setItem(visitorKey, JSON.stringify(visitorData));
          return visitorData.id;
        }
      }
    } catch (e) {
      console.warn('Zappy Analytics: LocalStorage not available');
    }
    
    // Generate new visitor ID
    var newVisitorId = 'zv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    try {
      localStorage.setItem(visitorKey, JSON.stringify({
        id: newVisitorId,
        created: Date.now(),
        lastSeen: Date.now()
      }));
    } catch (e) {
      // Continue without local storage
    }
    
    return newVisitorId;
  }
  
  // Generate or retrieve session ID (30 minutes)
  function getSessionId() {
    var sessionKey = 'zappy_session_' + config.websiteId;
    var session = null;
    
    try {
      session = sessionStorage.getItem(sessionKey);
      if (session) {
        var sessionData = JSON.parse(session);
        var now = Date.now();
        
        // Check if session is still valid
        if (now - sessionData.timestamp < config.sessionDuration) {
          // Update timestamp
          sessionData.timestamp = now;
          sessionStorage.setItem(sessionKey, JSON.stringify(sessionData));
          return sessionData.id;
        }
      }
    } catch (e) {
      console.warn('Zappy Analytics: SessionStorage not available');
    }
    
    // Generate new session ID
    var newSessionId = 'zs_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    try {
      sessionStorage.setItem(sessionKey, JSON.stringify({
        id: newSessionId,
        timestamp: Date.now()
      }));
    } catch (e) {
      // Continue without session storage
    }
    
    return newSessionId;
  }
  
  var visitorId = getVisitorId();
  var sessionId = getSessionId();
  
  // Site Optimization Agent — visual heatmap helpers
  function getBandAnchor(el) {
    var node = el;
    while (node && node !== document.body) {
      if (node.getAttribute && node.getAttribute('data-band-index') != null) {
        return { bandIndex: node.getAttribute('data-band-index'), sectionId: node.id || null };
      }
      node = node.parentElement;
    }
    node = el;
    while (node && node !== document.body) {
      if (node.tagName === 'SECTION' && node.id) {
        return { bandIndex: null, sectionId: node.id };
      }
      node = node.parentElement;
    }
    return { bandIndex: null, sectionId: null };
  }
  function heatmapFields(el, e) {
    var anchor = getBandAnchor(el);
    return {
      x: Math.round((e && e.pageX) || 0),
      y: Math.round((e && e.pageY) || 0),
      bandIndex: anchor.bandIndex,
      sectionId: anchor.sectionId
    };
  }
  function mergeFields(base, extra) {
    for (var k in extra) { if (Object.prototype.hasOwnProperty.call(extra, k)) base[k] = extra[k]; }
    return base;
  }
  // Track an event
  function trackEvent(eventType, data) {
    data = data || {};
    
    var eventData = {
      website_id: config.websiteId,
      event_type: eventType,
      page_path: window.location.pathname,
      referrer: document.referrer || 'direct',
      visitor_id: visitorId,
      session_id: sessionId,
      metadata: data
    };
    
    // Use sendBeacon if available (better for page unload events)
    if (navigator.sendBeacon) {
      var blob = new Blob([JSON.stringify(eventData)], { type: 'application/json' });
      navigator.sendBeacon(config.apiUrl, blob);
    } else {
      // Fallback to fetch
      fetch(config.apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(eventData),
        keepalive: true
      }).catch(function(error) {
        console.warn('Zappy Analytics: Failed to track event', error);
      });
    }
  }
  
  // Track page view
  if (config.trackPageViews) {
    trackEvent('pageview', {
      title: document.title,
      url: window.location.href
    });
  }
  
  // Track clicks on important elements
  if (config.trackClicks) {
    document.addEventListener('click', function(e) {
      var target = e.target;
      
      // Track button clicks (counted as actions)
      if (target.tagName === 'BUTTON' || target.closest('button')) {
        var button = target.tagName === 'BUTTON' ? target : target.closest('button');
        var clickMeta = {
          element: 'button',
          text: button.textContent.trim().substring(0, 100),
          id: button.id || null,
          class: button.className || null
        };
        mergeFields(clickMeta, heatmapFields(button, e));
        trackEvent('click', clickMeta);
      }
      
      // Track link clicks (navigation - not counted as actions)
      else if (target.tagName === 'A' || target.closest('a')) {
        var link = target.tagName === 'A' ? target : target.closest('a');
        var navMeta = {
          element: 'link',
          text: link.textContent.trim().substring(0, 100),
          href: link.href,
          external: link.hostname !== window.location.hostname
        };
        mergeFields(navMeta, heatmapFields(link, e));
        trackEvent('navigation', navMeta);
      }
    }, true);
  }
  
  // Track scroll depth milestones (visual heatmap reach signal)
  (function() {
    var milestones = [25, 50, 75, 100];
    var fired = {};
    var maxDepth = 0;
    function computeDepth() {
      var doc = document.documentElement;
      var scrollable = (doc.scrollHeight - window.innerHeight);
      if (scrollable <= 0) return 100;
      return Math.min(100, Math.round(((window.scrollY || window.pageYOffset || 0) / scrollable) * 100));
    }
    var ticking = false;
    function onScroll() {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(function() {
        var depth = computeDepth();
        if (depth > maxDepth) maxDepth = depth;
        for (var i = 0; i < milestones.length; i++) {
          var m = milestones[i];
          if (depth >= m && !fired[m]) {
            fired[m] = true;
            trackEvent('scroll_depth', { milestone: m, maxDepthPct: maxDepth });
          }
        }
        ticking = false;
      });
    }
    window.addEventListener('scroll', onScroll, { passive: true });
  })();
  
  // Track form submissions
  if (config.trackFormSubmissions) {
    document.addEventListener('submit', function(e) {
      var form = e.target;
      
      trackEvent('form_submit', {
        form_id: form.id || null,
        form_name: form.name || null,
        form_action: form.action || null,
        form_method: form.method || 'GET'
      });
    }, true);
  }
  
  // Track time on page (send on page unload)
  var pageLoadTime = Date.now();
  
  window.addEventListener('beforeunload', function() {
    var timeOnPage = Math.floor((Date.now() - pageLoadTime) / 1000); // in seconds
    
    trackEvent('page_unload', {
      time_on_page: timeOnPage,
      page_path: window.location.pathname
    });
  });
  
  // Expose tracking function globally for custom events
  window.zappyAnalytics = {
    track: trackEvent,
    getVisitorId: function() { return visitorId; },
    getSessionId: function() { return sessionId; }
  };
  
})();
</script>

<!-- Zappy Marketing Events -->
<script>
(function() {
  'use strict';
  if (window.zappyFireMarketingEvent) return;

  var ECOM_MODE = "";
  var IS_CATALOG = false;
  var IS_FULL = false;

  var ECOM_ALIAS = {
    begin_checkout: 'checkout_started',
    purchase: 'checkout_complete',
    add_to_cart: 'add_to_cart',
    view_product: 'view_product'
  };

  function pagePath() {
    try {
      if (window.ZAPPY_CONFIG && window.ZAPPY_CONFIG.currentPagePath) {
        return window.ZAPPY_CONFIG.currentPagePath;
      }
    } catch (e) {}
    try { return window.location.pathname || '/'; } catch (e2) { return '/'; }
  }

  function normalizeItems(meta) {
    meta = meta || {};
    var raw = meta.items || meta.cartItems || meta.cart_items || meta.lineItems || [];
    if (!Array.isArray(raw)) raw = [];
    var out = [];
    for (var i = 0; i < raw.length; i++) {
      var item = raw[i];
      if (!item || typeof item !== 'object') continue;
      var id = String(item.item_id || item.productId || item.product_id || item.id || '').trim();
      var name = String(item.item_name || item.productName || item.product_name || item.name || '').trim();
      var price = parseFloat(item.price != null ? item.price : (item.unitPrice != null ? item.unitPrice : 0)) || 0;
      var quantity = Math.max(1, parseInt(item.quantity != null ? item.quantity : (item.qty != null ? item.qty : 1), 10) || 1);
      if (!id && !name) continue;
      out.push({ item_id: id || name, item_name: name || id, price: price, quantity: quantity });
    }
    return out;
  }

  function buildGa4Params(eventId, meta) {
    meta = meta || {};
    var items = normalizeItems(meta);
    var value = parseFloat(meta.value != null ? meta.value : (meta.total != null ? meta.total : 0)) || 0;
    var currency = String(meta.currency || 'USD').toUpperCase();

    if (eventId === 'checkout_complete') {
      return {
        transaction_id: String(meta.transaction_id || meta.orderId || meta.order_id || meta.orderNumber || '') || undefined,
        value: value,
        currency: currency,
        items: items
      };
    }
    if (eventId === 'checkout_started') {
      return { value: value, currency: currency, items: items };
    }
    if (eventId === 'add_to_cart') {
      var atcItems = items.length ? items : [{
        item_id: String(meta.productId || meta.product_id || ''),
        item_name: String(meta.productName || meta.product_name || ''),
        price: parseFloat(meta.value != null ? meta.value : (meta.price != null ? meta.price : 0)) || 0,
        quantity: parseInt(meta.quantity != null ? meta.quantity : 1, 10) || 1
      }].filter(function(x) { return x.item_id || x.item_name; });
      return {
        value: value || (atcItems[0] ? atcItems[0].price * atcItems[0].quantity : 0),
        currency: currency,
        items: atcItems
      };
    }
    if (eventId === 'view_product') {
      var vpItems = items.length ? items : [{
        item_id: String(meta.productId || meta.product_id || ''),
        item_name: String(meta.productName || meta.product_name || ''),
        price: parseFloat(meta.price != null ? meta.price : (meta.value != null ? meta.value : 0)) || 0,
        quantity: 1
      }].filter(function(x) { return x.item_id || x.item_name; });
      return {
        currency: currency,
        value: value || (vpItems[0] ? vpItems[0].price : 0),
        items: vpItems
      };
    }
    if (eventId === 'whatsapp_click' || eventId === 'phone_click') {
      return { method: eventId === 'whatsapp_click' ? 'whatsapp' : 'phone', page_path: meta.pagePath || pagePath() };
    }
    if (eventId === 'contact_form_submitted' || eventId === 'product_inquiry') {
      return { page_path: meta.pagePath || pagePath() };
    }
    return meta;
  }

  function buildMetaParams(eventId, meta) {
    meta = meta || {};
    var items = normalizeItems(meta);
    var value = parseFloat(meta.value != null ? meta.value : (meta.total != null ? meta.total : 0)) || 0;
    var currency = String(meta.currency || 'USD').toUpperCase();
    var contentIds = [];
    var numItems = 0;
    for (var i = 0; i < items.length; i++) {
      if (items[i].item_id) contentIds.push(items[i].item_id);
      numItems += items[i].quantity || 1;
    }

    if (eventId === 'checkout_complete') {
      return {
        value: value,
        currency: currency,
        content_ids: contentIds.length ? contentIds : undefined,
        content_type: 'product',
        num_items: numItems || undefined,
        order_id: String(meta.order_id || meta.orderId || meta.transaction_id || meta.orderNumber || '') || undefined
      };
    }
    if (eventId === 'checkout_started') {
      return {
        value: value,
        currency: currency,
        content_ids: contentIds.length ? contentIds : undefined,
        content_type: 'product',
        num_items: numItems || parseInt(meta.itemCount != null ? meta.itemCount : 0, 10) || undefined
      };
    }
    if (eventId === 'add_to_cart') {
      var id = String(meta.productId || meta.product_id || contentIds[0] || '');
      return {
        value: value || (items[0] ? items[0].price * items[0].quantity : 0),
        currency: currency,
        content_ids: id ? [id] : (contentIds.length ? contentIds : undefined),
        content_type: 'product',
        content_name: meta.productName || meta.product_name || (items[0] && items[0].item_name),
        num_items: parseInt(meta.quantity != null ? meta.quantity : (numItems || 1), 10) || 1
      };
    }
    if (eventId === 'view_product') {
      var vid = String(meta.productId || meta.product_id || contentIds[0] || '');
      return {
        value: value || parseFloat(meta.price != null ? meta.price : 0) || 0,
        currency: currency,
        content_ids: vid ? [vid] : (contentIds.length ? contentIds : undefined),
        content_type: 'product',
        content_name: meta.productName || meta.product_name || (items[0] && items[0].item_name)
      };
    }
    if (eventId === 'whatsapp_click' || eventId === 'phone_click') {
      return {
        content_name: eventId === 'whatsapp_click' ? 'WhatsApp' : 'Phone',
        content_category: 'contact'
      };
    }
    if (eventId === 'contact_form_submitted' || eventId === 'product_inquiry') {
      return {
        content_name: eventId === 'product_inquiry' ? 'Product inquiry' : 'Contact form',
        content_category: meta.productName || meta.product_name || undefined
      };
    }
    return meta;
  }

  var PLATFORM = {
    whatsapp_click: { ga4: 'contact', meta: 'Contact', gtm: 'whatsapp_click', ecom: false },
    phone_click: { ga4: 'contact', meta: 'Contact', gtm: 'phone_click', ecom: false },
    contact_form_submitted: { ga4: 'generate_lead', meta: 'Lead', gtm: 'contact_form_submitted', ecom: false },
    checkout_started: { ga4: 'begin_checkout', meta: 'InitiateCheckout', gtm: 'begin_checkout', ecom: true },
    checkout_complete: { ga4: 'purchase', meta: 'Purchase', gtm: 'purchase', ecom: true },
    product_inquiry: { ga4: 'generate_lead', meta: 'Lead', gtm: 'product_inquiry', ecom: false },
    add_to_cart: { ga4: 'add_to_cart', meta: 'AddToCart', gtm: 'add_to_cart', ecom: true },
    view_product: { ga4: 'view_item', meta: 'ViewContent', gtm: 'view_item', ecom: true }
  };

  function purchaseDedupKey(orderId) {
    return 'zappy_purchase_fired_' + String(orderId || '');
  }

  function alreadyFiredPurchase(orderId) {
    if (!orderId) return false;
    try {
      return sessionStorage.getItem(purchaseDedupKey(orderId)) === '1';
    } catch (e) {
      return false;
    }
  }

  function markPurchaseFired(orderId) {
    if (!orderId) return;
    try { sessionStorage.setItem(purchaseDedupKey(orderId), '1'); } catch (e) {}
  }

  /**
   * Fire a marketing event to first-party analytics + GA4/GTM/Meta when present.
   * @param {string} eventName marketing ID or ecommerce alias
   * @param {object} [metadata]
   * @param {{ skipFirstParty?: boolean }} [opts]
   */
  window.zappyFireMarketingEvent = function(eventName, metadata, opts) {
    try {
      opts = opts || {};
      metadata = metadata || {};
      var eventId = ECOM_ALIAS[eventName] || eventName;
      var plat = PLATFORM[eventId];
      if (!plat) return;

      if (!metadata.pagePath && !metadata.page_path) {
        metadata.pagePath = pagePath();
      }

      if (eventId === 'checkout_complete') {
        var oid = String(metadata.orderId || metadata.order_id || metadata.transaction_id || '');
        if (oid && alreadyFiredPurchase(oid)) return;
        if (oid) markPurchaseFired(oid);
      }

      // First-party (skip when already tracked via zappyTrackEcomAnalytics path
      // that opts out, or when caller already recorded under a different name)
      if (!opts.skipFirstParty) {
        try {
          if (window.zappyAnalytics && typeof window.zappyAnalytics.track === 'function') {
            window.zappyAnalytics.track(eventId, metadata);
          }
        } catch (e1) {}
      }

      // GTM / dataLayer — platform-standard ecommerce event names
      try {
        window.dataLayer = window.dataLayer || [];
        if (plat.ecom) {
          var ga4ForGtm = buildGa4Params(eventId, metadata);
          var ecommerce = {};
          if (ga4ForGtm.transaction_id) ecommerce.transaction_id = ga4ForGtm.transaction_id;
          if (ga4ForGtm.value != null) ecommerce.value = ga4ForGtm.value;
          if (ga4ForGtm.currency) ecommerce.currency = ga4ForGtm.currency;
          if (ga4ForGtm.items) ecommerce.items = ga4ForGtm.items;
          window.dataLayer.push({ event: plat.gtm, ecommerce: ecommerce });
          // Secondary Zappy-specific trigger for merchants who want it
          if (eventId === 'checkout_complete' || eventId === 'checkout_started') {
            window.dataLayer.push({ event: eventId, ecommerce: ecommerce });
          }
        } else {
          var dl = { event: plat.gtm };
          for (var k in metadata) {
            if (Object.prototype.hasOwnProperty.call(metadata, k)) dl[k] = metadata[k];
          }
          window.dataLayer.push(dl);
        }
      } catch (e2) {}

      // GA4 gtag
      try {
        if (typeof window.gtag === 'function') {
          window.gtag('event', plat.ga4, buildGa4Params(eventId, metadata));
        }
      } catch (e3) {}

      // Meta Pixel (only when fbq is loaded — consent-gated lazy loader)
      try {
        if (typeof window.fbq === 'function') {
          window.fbq('track', plat.meta, buildMetaParams(eventId, metadata));
        }
      } catch (e4) {}
    } catch (err) {}
  };

  // ---- Click listeners (capture) ----
  var recent = Object.create(null);
  function dedupe(key) {
    var now = Date.now();
    if (recent[key] && now - recent[key] < 800) return true;
    recent[key] = now;
    return false;
  }

  function closest(el, selector) {
    if (!el) return null;
    if (el.closest) return el.closest(selector);
    return null;
  }

  function findAnchor(el) {
    var node = el;
    while (node && node !== document) {
      if (node.tagName === 'A') return node;
      node = node.parentElement;
    }
    return null;
  }

  function isWhatsAppHref(href) {
    if (!href) return false;
    var h = String(href).toLowerCase();
    return h.indexOf('wa.me/') !== -1 ||
      h.indexOf('api.whatsapp.com') !== -1 ||
      h.indexOf('whatsapp.com/send') !== -1 ||
      h.indexOf('whatsapp:') === 0;
  }

  document.addEventListener('click', function(e) {
    try {
      var target = e.target;
      if (!target) return;

      // WhatsApp
      var waFloat = closest(target, '.whatsapp-float, a.whatsapp-float, [data-zappy-whatsapp]');
      var anchor = findAnchor(target);
      var href = (anchor && anchor.href) || '';
      if (waFloat || (anchor && isWhatsAppHref(href))) {
        if (!dedupe('wa:' + href)) {
          var waSource = waFloat ? 'float' : 'link';
          window.zappyFireMarketingEvent('whatsapp_click', {
            source: waSource,
            href: href || null,
            pagePath: pagePath()
          });
        }
        return;
      }

      // Phone
      var phoneBtn = closest(target, '.phone-header-btn, .nav-phone-btn, .call-btn, [data-zappy-phone]');
      var telHref = '';
      if (anchor && anchor.href && String(anchor.href).toLowerCase().indexOf('tel:') === 0) {
        telHref = anchor.href;
      } else if (phoneBtn && phoneBtn.href && String(phoneBtn.href).toLowerCase().indexOf('tel:') === 0) {
        telHref = phoneBtn.href;
      }
      if (phoneBtn || telHref) {
        var phone = '';
        if (telHref) {
          phone = String(telHref).replace(/^tel:/i, '').trim();
        }
        if (!dedupe('tel:' + (phone || (phoneBtn && phoneBtn.id) || 'btn'))) {
          window.zappyFireMarketingEvent('phone_click', {
            source: phoneBtn ? 'button' : 'link',
            phone: phone || null,
            href: telHref || null,
            pagePath: pagePath()
          });
        }
        return;
      }

      // Catalog / product inquiry
      if (IS_CATALOG || IS_FULL) {
        var inq = closest(target, '.card-inquiry-btn, #zappy-pdp-inquiry-btn, a.inquiry-btn');
        if (inq) {
          if (!dedupe('inq:' + (inq.id || inq.className))) {
            var product = window.currentProduct || null;
            var productId = (inq.getAttribute && inq.getAttribute('data-product-id')) ||
              (product && product.id) || null;
            var productName = (inq.getAttribute && inq.getAttribute('data-product-name')) ||
              (product && product.name) || null;
            var channel = 'contact_page';
            var inqHref = (inq.tagName === 'A' && inq.href) ? inq.href : '';
            if (inqHref && String(inqHref).toLowerCase().indexOf('mailto:') === 0) channel = 'mailto';
            window.zappyFireMarketingEvent('product_inquiry', {
              source: inq.id === 'zappy-pdp-inquiry-btn' ? 'pdp' : 'card',
              productId: productId,
              productName: productName,
              channel: channel,
              pagePath: pagePath()
            });
          }
        }
      }
    } catch (err) {}
  }, true);
})();

(function() {

    document.querySelectorAll('.faq-answer').forEach(function(answer, index) {
      var item = answer.parentElement;
      if (!item) return;
      var trigger = item.querySelector('button, [role="button"], summary');
      if (!trigger || trigger.dataset.zappyMhtmlFaqReady === 'true') return;

      item.dataset.zappyMhtmlFaqItem = 'true';
      trigger.dataset.zappyMhtmlFaqReady = 'true';
      if (!answer.id) answer.id = 'zappy-mhtml-faq-answer-' + index;

      function setOpen(open) {
        item.classList.toggle('open', open);
        trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
        answer.style.maxHeight = open ? answer.scrollHeight + 'px' : '0px';
      }

      setOpen(item.classList.contains('open'));
      trigger.addEventListener('click', function(event) {
        event.preventDefault();
        event.stopImmediatePropagation();
        setOpen(!item.classList.contains('open'));
      }, true);
    });
  }

  function closeMenu() {
    document.body.classList.remove('zappy-mhtml-menu-open');
    document.querySelectorAll('[data-zappy-mhtml-menu-toggle]').forEach(function(btn) {
      btn.setAttribute('aria-expanded', 'false');

    if (document.body.dataset.zappyMhtmlScrollReady === 'true') return;
    if (!document.querySelector('[data-zappy-mhtml-header]')) return;
    document.body.dataset.zappyMhtmlScrollReady = 'true';
    var onScroll = function() {
      document.body.classList.toggle('zappy-mhtml-scrolled', window.scrollY > 8);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  function init() {
    initFaqAccordions();
    initHeaderScroll();
    var toggle = document.querySelector('[data-zappy-mhtml-menu-toggle]');
    var nav = document.querySelector('[data-zappy-mhtml-nav]');
    if (!toggle || !nav || toggle.dataset.zappyMhtmlReady === 'true') return;
    toggle.dataset.zappyMhtmlReady = 'true';

      var open = !document.body.classList.contains('zappy-mhtml-menu-open');

      });
